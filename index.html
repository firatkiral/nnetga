<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANeuralNet WASM</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3efe4;
            --panel: #fffaf0;
            --text: #1f1f1f;
            --muted: #67635c;
            --accent: #ad5c3d;
            --accent-2: #2f6f6d;
            --border: rgba(31, 31, 31, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(173, 92, 61, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(47, 111, 109, 0.14), transparent 26%),
                linear-gradient(180deg, #f8f4ea 0%, var(--bg) 100%);
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 48px 20px 56px;
        }

        .hero {
            display: grid;
            gap: 18px;
            margin-bottom: 28px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.4rem, 6vw, 4.8rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .subtitle {
            max-width: 62ch;
            margin: 0;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: color-mix(in srgb, var(--panel) 86%, white 14%);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 18px 18px 20px;
            box-shadow: 0 14px 40px rgba(31, 31, 31, 0.08);
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            letter-spacing: 0.01em;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-2);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .status::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: currentColor;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.92rem;
            line-height: 1.55;
        }
    </style>
</head>

<body>
    <main>
        <section class="hero">
            <h1>GANeuralNet WASM</h1>
            <p class="subtitle">
                This page loads the C++/Emscripten build from <span style="color: var(--accent);">nnetga.js</span>
                and runs the XOR training demo in the browser.
            </p>
        </section>

        <section class="grid">
            <article class="card">
                <h2>Runtime</h2>
                <div class="status" id="runtime-status">Waiting for module</div>
                <pre id="runtime-log"></pre>
            </article>

            <article class="card">
                <h2>Result</h2>
                <pre id="result-log">No output yet.</pre>
            </article>
        </section>
    </main>

    <script type="module">
        import createModule from './nnetga.js';

        const runtimeStatus = document.getElementById('runtime-status');
        const runtimeLog = document.getElementById('runtime-log');
        const resultLog = document.getElementById('result-log');

        const logLines = [];
        const appendLog = (value) => {
            const text = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
            logLines.push(text);
            runtimeLog.textContent = logLines.join('\n');
        };

        console.log = (...args) => {
            appendLog(args.map((item) => (typeof item === 'string' ? item : JSON.stringify(item))).join(' '));
        };

        const Module = await createModule();
        runtimeStatus.textContent = 'Module ready';

        const agentNum = 50;
        const generations = 1000;

        Module.add_pop(1, 0.7, 0.02, 0.5);
        Module.add_agent(0, agentNum);
        Module.add_net(0, 2, 1, 3, 1);

        const makeBatch = (left, right) => [[...Array(agentNum)].map(() => [left, right])];
        const test1 = makeBatch(0, 1);
        const test2 = makeBatch(0, 0);
        const test3 = makeBatch(1, 1);
        const test4 = makeBatch(1, 0);

        const scoreOutput = (output, expected) => (1 - Math.abs(expected - output)) * 100;

        const evaluatePopulation = () => {
            const a = Module.update_js(test1);
            const b = Module.update_js(test2);
            const c = Module.update_js(test3);
            const d = Module.update_js(test4);
            const score = Array(agentNum).fill(0);

            for (let agentIndex = 0; agentIndex < agentNum; agentIndex += 1) {
                score[agentIndex] += scoreOutput(a[0][agentIndex][0], 1);
                score[agentIndex] += scoreOutput(b[0][agentIndex][0], 0);
                score[agentIndex] += scoreOutput(c[0][agentIndex][0], 0);
                score[agentIndex] += scoreOutput(d[0][agentIndex][0], 1);

                if (score[agentIndex] > 320) score[agentIndex] += 10;
                if (score[agentIndex] > 370) score[agentIndex] += 30;
                if (score[agentIndex] > 390) score[agentIndex] += 60;
                if (score[agentIndex] > 395) score[agentIndex] += 100;
            }

            const hiScore = Math.max(...score);
            const average = score.reduce((sum, value) => sum + value, 0) / agentNum;
            const winnerAgent = score.indexOf(hiScore);

            return { score, hiScore, average, winnerAgent, a, b, c, d };
        };

        let result = null;
        for (let generation = 0; generation < generations; generation += 1) {
            result = evaluatePopulation();
            Module.next_gen_js(0, result.score, 1, 1, 1, 0);

            if (generation % 50 === 0) {
                console.log({ Generation: generation, Average: result.average, Best: result.hiScore });
            }
        }

        result = evaluatePopulation();
        resultLog.textContent = [
            `Agent: ${result.winnerAgent} winner with: ${result.hiScore}`,
            `Average score: ${result.average}`,
            `0, 1 -> ${result.a[0][result.winnerAgent][0]}`,
            `0, 0 -> ${result.b[0][result.winnerAgent][0]}`,
            `1, 1 -> ${result.c[0][result.winnerAgent][0]}`,
            `1, 0 -> ${result.d[0][result.winnerAgent][0]}`,
            '----',
        ].join('\n');
    </script>
</body>

</html>
